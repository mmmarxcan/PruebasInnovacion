<ion-content [fullscreen]="true">
  <div class="map-container">

    <!-- Real Leaflet Map -->
    <div id="leaflet-map" style="width: 100%; height: 100%; z-index: 1;"></div>

    <!-- Center Button -->
    <button class="btn-center" (click)="centerOnUser()">
      <ion-icon name="navigate-outline"></ion-icon>
    </button>

    <!-- Top UI -->
    <div class="top-controls">
      <!-- Back Button (New) -->
      <button class="control-btn back" (click)="backToWelcome()">
        <ion-icon name="arrow-back-outline"></ion-icon>
      </button>

      <button class="control-btn filters" (click)="toggleFilters()">
        <ion-icon name="options-outline"></ion-icon>
        <span>Filtros</span>
      </button>

      <button class="control-btn menu" (click)="toggleMenu()">
        <ion-icon name="settings-outline"></ion-icon>
      </button>
    </div>

    <!-- Menu Dropdown -->
    <div class="menu-dropdown" *ngIf="showMenu">
      <button (click)="goToPreferences()">
        <ion-icon name="options-outline"></ion-icon>
        <span>Preferencias</span>
      </button>
      <button class="logout" (click)="logout()">
        <ion-icon name="log-out-outline"></ion-icon>
        <span>Cerrar sesión</span>
      </button>
    </div>

    <!-- Filters Panel -->
    <div class="filters-panel" *ngIf="showFilters">
      <div class="panel-header">
        <h3>Filtrar por</h3>
        <button (click)="toggleFilters()">
          <ion-icon name="close-outline"></ion-icon>
        </button>
      </div>
      <div class="active-filters">
        <span class="filter-tag">Italiana</span>
        <span class="filter-tag">Mexicana</span>
      </div>
      <p class="budget-info">Presupuesto: <strong>Moderado</strong></p>
    </div>

    <!-- Bottom Sheet -->
    <div class="bottom-sheet" *ngIf="showBottomSheet || selectedRestaurant" [class.navigating]="isNavigating">
      <div class="sheet-handle"></div>

      <div class="sheet-header">
        <h3>{{ isNavigating ? 'En camino a' : 'Restaurantes cercanos' }}</h3>
        <p *ngIf="!isNavigating">{{ restaurants.length }} lugares encontrados</p>
        <p *ngIf="isNavigating">{{ selectedRestaurant?.name }}</p>
      </div>

      <div class="places-list">
        <!-- If navigating, only show the selected one with a cancel option or just a minimal view -->
        <div *ngIf="isNavigating && selectedRestaurant" class="navigation-info">
          <button class="btn-cancel-nav" (click)="cancelNavigation()">
            <ion-icon name="close-outline"></ion-icon>
            <span>Finalizar navegación</span>
          </button>
        </div>

        <button *ngFor="let place of restaurants" 
          class="place-item"
          [class.active]="selectedRestaurant?.id === place.id" 
          [hidden]="isNavigating && selectedRestaurant?.id !== place.id"
          (click)="handleMarkerClick(place)">

          <img [src]="place.image" alt="{{ place.name }}" class="place-img">

          <div class="place-info">
            <h4>{{ place.name }}</h4>
            <p class="type">{{ place.type }}</p>
            <div class="meta-row">
              <div class="rating">
                <ion-icon name="star"></ion-icon>
                <span>{{ place.rating }}</span>
              </div>
              <span class="price">{{ place.priceLevel }}</span>
            </div>
            
            <!-- Continuar Button only for active item -->
            <div class="action-row" *ngIf="selectedRestaurant?.id === place.id && !isNavigating">
              <button class="btn-continue" (click)="startNavigation(); $event.stopPropagation()">
                <span>Continuar al mapa</span>
                <ion-icon name="arrow-forward-outline"></ion-icon>
              </button>
            </div>
          </div>

          <div class="nav-icon" *ngIf="!isNavigating">
            <ion-icon name="navigate-outline"></ion-icon>
          </div>
        </button>
      </div>
    </div>

  </div>
</ion-content>
