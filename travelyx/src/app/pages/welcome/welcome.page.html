<ion-content [fullscreen]="true" class="premium-glass-bg">
    <div class="welcome-view relative-content">
        
        <div class="mascot-interactive-area" (click)="pokePolly()">
            <div class="glass-speech-bubble bounce-in">
                <p>{{ currentPhrase }}</p>
                <div class="tail"></div>
            </div>
            <img src="assets/polly.png" alt="Polly" class="floating-polly interactive">
        </div>

        <div class="glass-card mt-auto">
            <h1>Travelyx</h1>
            <h2>¿Qué buscas hoy?</h2>
            <p class="subtitle">Selecciona una categoría para explorar Progreso</p>

            <div class="tiles-grid mt-4">
                <button class="glass-tile" (click)="selectPlaceContext('Restaurante')">
                    <ion-icon name="restaurant-outline"></ion-icon>
                    <span>Restaurantes</span>
                </button>
                <button class="glass-tile" (click)="selectPlaceContext('Hotel')">
                    <ion-icon name="bed-outline"></ion-icon>
                    <span>Hoteles</span>
                </button>
                <button class="glass-tile full-width" (click)="selectPlaceContext('Zona Turística')">
                    <ion-icon name="map-outline"></ion-icon>
                    <span>Zonas Turísticas</span>
                </button>
            </div>

            <button class="btn-text-premium mt-6" (click)="goToAdminLogin()">
                Portal de Administradores
            </button>
        </div>
    </div>
</ion-content>
