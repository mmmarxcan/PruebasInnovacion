<ion-content [fullscreen]="true">
  <div class="preferences-container">

    <!-- Header / Back Button -->
    <div class="header-overlay">
      <button class="btn-back" (click)="handleBack()">
        <ion-icon name="arrow-back-outline"></ion-icon>
        <span class="back-text">Atrás</span>
      </button>
    </div>

    <!-- Polly & Header Section -->
    <div class="polly-section">
      <!-- Octopus Character -->
      <div class="octopus-image-container small">
        <img src="assets/polly.png" alt="Polly Mascot" class="polly-img">
      </div>

      <!-- Speech Bubble -->
      <div class="speech-bubble">
        <div class="tail"></div>
        <p>{{ getPollyMessage() }}</p>
      </div>

      <!-- Progress Indicators -->
      <div class="progress-bar">
        <div class="step-indicator" [class.active]="step === currentStep" [class.completed]="step < currentStep"
          *ngFor="let step of [1, 2, 3]">
        </div>
      </div>
    </div>

    <!-- Content Area -->
    <div class="content-area">

      <!-- Step 1: Food Type -->
      <div *ngIf="currentStep === 1" class="step-content fade-in-up">
        <h3>Tipo de comida</h3>
        <p class="subtitle">Selecciona tu favorita</p>

        <div class="options-grid">
          <button *ngFor="let food of foodTypes" class="option-card"
            [class.selected]="selectedFoodType === food.id" (click)="toggleFoodType(food.id)">
            <ion-icon [name]="food.icon" class="option-icon"></ion-icon>
            <span class="option-label">{{ food.label }}</span>
          </button>
        </div>
      </div>

      <!-- Step 2: Budget -->
      <div *ngIf="currentStep === 2" class="step-content fade-in-up">
        <div class="section-block">
          <h3>Presupuesto</h3>
          <p class="subtitle">¿Cuánto quieres gastar?</p>

          <div class="budget-list">
            <button *ngFor="let budget of budgetOptions" class="budget-card"
              [class.selected]="selectedBudget === budget.id" (click)="selectBudget(budget.id)">
              <div class="budget-info">
                <div class="budget-symbol">{{ budget.symbol }}</div>
                <div class="budget-text">
                  <span class="budget-label">{{ budget.label }}</span>
                  <span class="budget-desc">{{ budget.description }}</span>
                </div>
              </div>
              <div class="radio-circle">
                <div class="radio-inner" *ngIf="selectedBudget === budget.id"></div>
              </div>
            </button>
          </div>
        </div>
      </div>

      <!-- Step 3: Place Type -->
      <div *ngIf="currentStep === 3" class="step-content fade-in-up">
        <div class="section-block">
          <h3>Tipo de lugar</h3>
          <p class="subtitle">Ambiente preferido</p>

          <div class="options-grid">
            <button *ngFor="let place of placeTypes" class="option-card"
              [class.selected]="selectedPlaceType === place.id" (click)="togglePlaceType(place.id)">
              <ion-icon [name]="place.icon" class="option-icon"></ion-icon>
              <span class="option-label">{{ place.label }}</span>
            </button>
          </div>
        </div>
      </div>

    </div>

    <!-- Extra Back Link for Steps 2 & 3 -->
    <div class="bottom-actions" *ngIf="currentStep > 1">
        <button class="btn-text-back" (click)="handleBack()">
           Volver al paso anterior
        </button>
    </div>

  </div>
</ion-content>
