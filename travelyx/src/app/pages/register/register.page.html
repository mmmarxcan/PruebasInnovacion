<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Crear Cuenta</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">

  <div class="register-container">
    <div class="logo-container">
      <img src="assets/icon/favicon.png" alt="Travelyx Logo" class="logo" /> <!-- Asumiendo logo o usar texto -->
      <h1>Únete a Travelyx</h1>
      <p>Gestiona tu restaurante y llega a más clientes.</p>
    </div>

    <div class="form-container">
      <ion-item fill="outline" class="ion-margin-bottom">
        <ion-label position="floating">Nombre Completo</ion-label>
        <ion-input [(ngModel)]="user.nombre" type="text"></ion-input>
      </ion-item>

      <ion-item fill="outline" class="ion-margin-bottom">
        <ion-label position="floating">Correo Electrónico</ion-label>
        <ion-input [(ngModel)]="user.email" type="email"></ion-input>
      </ion-item>

      <ion-item fill="outline" class="ion-margin-bottom">
        <ion-label position="floating">Contraseña</ion-label>
        <ion-input [(ngModel)]="user.password" type="password"></ion-input>
      </ion-item>

      <ion-button expand="block" (click)="register()" [disabled]="isLoading">
        <span *ngIf="!isLoading">Registrarse</span>
        <ion-spinner *ngIf="isLoading" name="crescent"></ion-spinner>
      </ion-button>

      <div class="ion-text-center ion-margin-top">
        <p>¿Ya tienes cuenta? <a routerLink="/login">Inicia Sesión</a></p>
      </div>
    </div>
  </div>

</ion-content>
