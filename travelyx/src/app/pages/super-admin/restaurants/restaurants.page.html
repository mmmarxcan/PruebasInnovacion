<ion-header [translucent]="true">
    <ion-toolbar color="primary">
        <ion-buttons slot="start">
            <ion-back-button defaultHref="/super-admin/dashboard"></ion-back-button>
        </ion-buttons>
        <ion-title>Gestión de Restaurantes</ion-title>
    </ion-toolbar>
    <ion-toolbar color="primary">
        <ion-searchbar (ionInput)="filterList($event)" placeholder="Buscar restaurante..."></ion-searchbar>
    </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
    <ion-list>
        <ion-item *ngFor="let restaurant of filteredRestaurants">
            <ion-avatar slot="start">
                <img [src]="restaurant.foto_portada || 'https://ionicframework.com/docs/img/demos/avatar.svg'" />
            </ion-avatar>
            <ion-label>
                <h2>{{ restaurant.nombre }}</h2>
                <p>{{ restaurant.categoria }}</p>
                <p><small>{{ restaurant.direccion }}</small></p>
            </ion-label>
            <ion-badge slot="end"
                [color]="restaurant.estado === 'active' ? 'success' : (restaurant.estado === 'pending' ? 'warning' : 'danger')">
                {{ restaurant.estado | titlecase }}
            </ion-badge>
            <ion-button fill="clear" slot="end" (click)="setOpen(true, restaurant)">
                <ion-icon name="ellipsis-vertical-outline" slot="icon-only"></ion-icon>
            </ion-button>
        </ion-item>
    </ion-list>

    <ion-action-sheet [isOpen]="isActionSheetOpen" header="Acciones" [buttons]="actionSheetButtons"
        (didDismiss)="handleAction($event)"></ion-action-sheet>

</ion-content>
