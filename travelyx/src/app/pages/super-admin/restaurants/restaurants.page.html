<ion-header [translucent]="true">
    <ion-toolbar color="primary">
        <ion-buttons slot="start">
            <ion-back-button defaultHref="/super-admin/dashboard"></ion-back-button>
        </ion-buttons>
        <ion-title>Gestión de Restaurantes</ion-title>
    </ion-toolbar>
    <ion-toolbar color="primary">
        <ion-searchbar (ionInput)="filterList($event)" placeholder="Buscar restaurante..."></ion-searchbar>
    </ion-toolbar>
    <ion-toolbar color="primary">
        <ion-segment [(ngModel)]="selectedSegment" (ionChange)="onSegmentChange()">
            <ion-segment-button value="active">
                <ion-label>Activos</ion-label>
            </ion-segment-button>
            <ion-segment-button value="pending">
                <ion-label>Pendientes</ion-label>
            </ion-segment-button>
            <ion-segment-button value="inactive">
                <ion-label>Inactivos</ion-label>
            </ion-segment-button>
        </ion-segment>
    </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
    <ion-list>
        <ion-item *ngFor="let restaurant of filteredRestaurants">
            <ion-avatar slot="start">
                <img [src]="restaurant.foto_portada || 'https://ionicframework.com/docs/img/demos/avatar.svg'" />
            </ion-avatar>
            <ion-label>
                <h2>{{ restaurant.nombre }}</h2>
                <p>{{ restaurant.categoria }}</p>
                <p><small>{{ restaurant.direccion }}</small></p>
            </ion-label>
            
            <div slot="end">
                <!-- Actions for Pending -->
                <ng-container *ngIf="restaurant.estado === 'pending'">
                    <ion-button fill="clear" color="success" (click)="updateStatus(restaurant, 'active')">
                        <ion-icon name="checkmark-circle-outline" slot="icon-only"></ion-icon>
                    </ion-button>
                    <ion-button fill="clear" color="danger" (click)="updateStatus(restaurant, 'inactive')">
                        <ion-icon name="ban-outline" slot="icon-only"></ion-icon>
                    </ion-button>
                </ng-container>

                <!-- Actions for Active -->
                <ion-button *ngIf="restaurant.estado === 'active'" fill="clear" color="danger" (click)="updateStatus(restaurant, 'inactive')">
                    <ion-icon name="ban-outline" slot="icon-only"></ion-icon>
                </ion-button>

                <!-- Actions for Inactive -->
                <ion-button *ngIf="restaurant.estado === 'inactive'" fill="clear" color="success" (click)="updateStatus(restaurant, 'active')">
                    <ion-icon name="checkmark-circle-outline" slot="icon-only"></ion-icon>
                </ion-button>
            </div>
        </ion-item>
    </ion-list>

</ion-content>
