<ion-header [translucent]="true">
    <ion-toolbar color="secondary">
        <ion-buttons slot="start">
            <ion-button (click)="cancel()">
                <ion-icon name="arrow-back-outline"></ion-icon>
            </ion-button>
        </ion-buttons>
        <ion-title>{{ isEditMode ? 'Editar Perfil' : 'Nuevo Restaurante' }}</ion-title>
        <ion-buttons slot="end">
            <ion-button (click)="saveRestaurant()">
                <ion-icon name="save-outline" slot="start"></ion-icon>
                Guardar
            </ion-button>
        </ion-buttons>
    </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">

    <form (ngSubmit)="saveRestaurant()">
        <ion-item>
            <ion-label position="stacked">Nombre del Restaurante</ion-label>
            <ion-input [(ngModel)]="restaurant.nombre" name="nombre" placeholder="Ej. La Palapa Feliz"></ion-input>
        </ion-item>

        <ion-item>
            <ion-label position="stacked">Categoría</ion-label>
            <ion-select [(ngModel)]="restaurant.categoria" name="categoria" placeholder="Selecciona una">
                <ion-select-option *ngFor="let cat of categories" [value]="cat">{{ cat }}</ion-select-option>
            </ion-select>
        </ion-item>

        <ion-item>
            <ion-label position="stacked">Dirección</ion-label>
            <ion-textarea [(ngModel)]="restaurant.direccion" name="direccion"
                placeholder="Calle 19 x 80..."></ion-textarea>
        </ion-item>

        <ion-item>
            <ion-label position="stacked">Teléfono</ion-label>
            <ion-input [(ngModel)]="restaurant.telefono" name="telefono" type="tel"></ion-input>
        </ion-item>

        <ion-item>
            <ion-label position="stacked">Sitio Web / Facebook</ion-label>
            <ion-input [(ngModel)]="restaurant.website" name="website" type="url"></ion-input>
        </ion-item>

        <ion-item lines="none">
            <ion-label position="stacked">Foto de Portada</ion-label>
            <!-- Hidden File Input -->
            <input type="file" (change)="onFileSelected($event, 'cover')" #fileInput style="display: none;">

            <div class="div-image-upload">
                <ion-button fill="outline" (click)="fileInput.click()">
                    <ion-icon name="cloud-upload-outline" slot="start"></ion-icon>
                    Subir Imagen
                </ion-button>
                <div *ngIf="restaurant.foto_portada" class="ion-margin-top">
                    <img [src]="restaurant.foto_portada" style="max-height: 200px; border-radius: 8px;">
                </div>
            </div>
        </ion-item>

        <div class="ion-padding-top">
            <ion-button expand="block" type="submit" color="secondary">
                {{ isEditMode ? 'Actualizar Información' : 'Crear Restaurante' }}
            </ion-button>
        </div>
    </form>

</ion-content>
