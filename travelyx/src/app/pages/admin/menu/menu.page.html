<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/admin/dashboard"></ion-back-button>
    </ion-buttons>
    <ion-title>Gestión de Menú</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">

  <div class="ion-text-center ion-padding" *ngIf="dishes.length === 0">
    <ion-icon name="pizza-outline" style="font-size: 4rem; color: #ccc;"></ion-icon>
    <p>Aún no hay platillos en el menú.</p>
  </div>

  <ion-list *ngIf="dishes.length > 0">
    <ion-item *ngFor="let dish of dishes">
      <ion-thumbnail slot="start">
        <img [src]="dish.foto_url || 'https://ionicframework.com/docs/img/demos/thumbnail.svg'" />
      </ion-thumbnail>
      <ion-label>
        <h2>{{ dish.nombre }}</h2>
        <p>{{ dish.descripcion }}</p>
        <p><strong>${{ dish.precio }}</strong> • {{ dish.categoria }}</p>
      </ion-label>
      <ion-button fill="clear" color="danger" slot="end" (click)="deleteDish(dish.id)">
        <ion-icon name="trash-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-item>
  </ion-list>

  <ion-fab slot="fixed" vertical="bottom" horizontal="end">
    <ion-fab-button (click)="setOpen(true)">
      <ion-icon name="add-outline"></ion-icon>
    </ion-fab-button>
  </ion-fab>

  <ion-modal [isOpen]="isModalOpen">
    <ng-template>
      <ion-header>
        <ion-toolbar>
          <ion-title>Nuevo Platillo</ion-title>
          <ion-buttons slot="end">
            <ion-button (click)="setOpen(false)">Cancelar</ion-button>
          </ion-buttons>
        </ion-toolbar>
      </ion-header>
      <ion-content class="ion-padding">
        <ion-item>
          <ion-label position="stacked">Nombre del Platillo</ion-label>
          <ion-input [(ngModel)]="newDish.nombre" placeholder="Ej. Tacos de Camarón"></ion-input>
        </ion-item>
        <ion-item>
          <ion-label position="stacked">Descripción</ion-label>
          <ion-textarea [(ngModel)]="newDish.descripcion" placeholder="Ingredientes, detalles..."></ion-textarea>
        </ion-item>
        <ion-item>
          <ion-label position="stacked">Precio</ion-label>
          <ion-input type="number" [(ngModel)]="newDish.precio" placeholder="0.00"></ion-input>
        </ion-item>
        <ion-item>
          <ion-label position="stacked">Categoría</ion-label>
          <ion-select [(ngModel)]="newDish.categoria">
            <ion-select-option value="Entrante">Entrante</ion-select-option>
            <ion-select-option value="Principal">Principal</ion-select-option>
            <ion-select-option value="Postre">Postre</ion-select-option>
            <ion-select-option value="Bebida">Bebida</ion-select-option>
          </ion-select>
        </ion-item>
        <ion-item>
          <ion-label position="stacked">URL Foto (Opcional)</ion-label>
          <ion-input [(ngModel)]="newDish.foto_url" placeholder="https://..."></ion-input>
        </ion-item>

        <ion-button expand="block" class="ion-margin-top" (click)="saveDish()">Guardar Platillo</ion-button>
      </ion-content>
    </ng-template>
  </ion-modal>

</ion-content>
